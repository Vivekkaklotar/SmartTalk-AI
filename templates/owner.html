{% extends "base.html" %}

{% block title %}Owner Panel{% endblock %}

{% block content %}
<div class="navbar">Owner Control Panel</div>

<div class="main-container">

<div class="glass owner-box">

    <h2 class="owner-title">Owner Panel</h2>

    <div class="owner-grid">

        <button class="owner-btn">Manage Users</button>
        <button class="owner-btn">Reports</button>
        <button class="owner-btn">Settings</button>
        <button class="owner-btn" onclick="showRegister()">Create New User</button>

        <a href="/dashboard" style="grid-column: span 2;">
            <button class="owner-btn back-btn">Back</button>
        </a>

    </div>

</div>

</div>

<!-- REGISTER MODAL SAME (NO CHANGE) -->
<div id="registerModal"
     style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">

    <div class="glass" style="width:90%; max-width:420px;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Create Account</h2>
            <button onclick="hideRegister()" style="background:none;border:none;font-size:22px;color:#ff6b6b;">×</button>
        </div>

        <form method="POST" action="/register">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>

            <button type="submit">Create Account</button>
            <button type="button" onclick="hideRegister()">Cancel</button>
        </form>

    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function showRegister() {
    document.getElementById('registerModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function hideRegister() {
    document.getElementById('registerModal').style.display = 'none';
    document.body.style.overflow = 'auto';
}
document.getElementById('registerModal').onclick = function(e) {
    if (e.target === this) hideRegister();
};
</script>
{% endblock %}
